name: Build POS Offline APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependencias
        run: npm install

      - name: Agregar plataforma Android (si no existe)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Generar íconos y splash desde resources/
        run: npx capacitor-assets generate --android

      - name: Sincronizar web -> Android
        run: npx cap sync android

      - name: Dar permisos a gradlew
        run: chmod +x android/gradlew

      - name: Compilar APK (debug)
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: demipati-pos-offline-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
